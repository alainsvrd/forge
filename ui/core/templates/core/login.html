<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forge — Login</title>
  <style>
    :root { --bg: #0f1117; --surface: #1a1d27; --border: #2e3347; --text: #e1e4ed; --accent: #6c8cff; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      background: var(--bg); color: var(--text);
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh;
    }
    .login-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; padding: 40px; width: 360px;
    }
    h1 { font-size: 24px; margin-bottom: 8px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
    p { font-size: 13px; color: #8b90a5; margin-bottom: 24px; }
    label { display: block; font-size: 12px; color: #8b90a5; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
    input {
      width: 100%; padding: 10px 12px; margin-bottom: 16px;
      background: #242836; border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: inherit; font-size: 14px;
    }
    input:focus { outline: none; border-color: var(--accent); }
    button {
      width: 100%; padding: 10px; background: var(--accent); border: none;
      border-radius: 6px; color: #fff; font-family: inherit; font-size: 14px;
      cursor: pointer; font-weight: 600;
    }
    button:hover { opacity: 0.9; }
    .error { color: #f87171; font-size: 13px; margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="login-box">
    <h1>Forge</h1>
    <p>Autonomous Development Platform</p>
    {% if form.errors %}
      <div class="error">Invalid username or password.</div>
    {% endif %}
    <form method="post">
      {% csrf_token %}
      <label for="id_username">Username</label>
      <input type="text" name="username" id="id_username" autofocus>
      <label for="id_password">Password</label>
      <input type="password" name="password" id="id_password">
      <button type="submit">Sign In</button>
    </form>
  </div>
</body>
</html>
